global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'api_tester'
    environment: 'development'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Tester application
  # Note: Use 'host.docker.internal' on Windows/Mac, or '172.17.0.1' on Linux
  # For local development without Docker, use 'host.docker.internal:8080'
  - job_name: 'api_tester'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          app: 'api_tester'
          service: 'marking-api'
